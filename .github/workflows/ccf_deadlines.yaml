name: Update CCF Deadlines

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update-deadlines:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r ccf_deadlines_fetcher/requirements.txt

      - name: Fetch CCF deadlines
        run: python3 ccf_deadlines_fetcher/main.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/data/cfp.json
          git diff --staged --quiet || git commit -m "chore: update CCF A deadlines [skip ci]"
          git push
